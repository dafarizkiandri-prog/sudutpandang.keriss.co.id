<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sedang Pemeliharaan Sistem</title>
    <style>
        /* Pengaturan Dasar */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        /* Kartu Kontainer Utama */
        .maintenance-card {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 40px 30px;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        /* Container untuk GIF */
        .gif-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }
        .gif-container img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Teks */
        h1 {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 12px;
        }
        p {
            font-size: 15px;
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Progres Bar Animasi */
        .progress-container {
            background-color: #e5e7eb;
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin-bottom: 30px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            background-color: #3b82f6;
            height: 100%;
            width: 70%; /* Tingkat progres simulasi */
            border-radius: 10px;
            position: absolute;
            animation: loading-animation 2s infinite ease-in-out;
        }

        /* Info Kontak/Footer Kecil */
        .footer-text {
            font-size: 13px;
            color: #9ca3af;
        }

        /* Animasi Progres */
        @keyframes loading-animation {
            0% {
                left: -10%;
                width: 30%;
            }
            50% {
                left: 40%;
                width: 40%;
            }
            100% {
                left: 110%;
                width: 30%;
            }
        }
    </style>
</head>
<body>

    <div class="maintenance-card">
        <!-- Area GIF Meme (Kucing mengetik cepat) -->
        <div class="gif-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3N0NDI3dmFkd3V1aHR3b3ZhaWhvZnZkZnB5dWQxZWJ0amRnMmdkciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/unqAMCtXaso76/giphy.gif" alt="Developer sedang panik memperbaiki server">
        </div>

        <!-- Pesan Pemeliharaan -->
        <h1>Waduh, Lagi Diberesin Nih!</h1>
        <p>Website kami sedang dalam proses pemeliharaan berkala agar kinerjanya lebih optimal. Mohon ditunggu, tim kami sedang bekerja sekeras kucing di atas.</p>

        <!-- Visual Progres -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <!-- Footer -->
        <div class="footer-text">
            Kami akan segera kembali secara otomatis. Terima kasih atas kesabaran Anda!
        </div>
    </div>

</body>
</html>
