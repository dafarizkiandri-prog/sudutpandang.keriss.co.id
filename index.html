<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance</title>
    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #080710;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Efek Garis Scanline Latar Belakang */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Container Utama */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            z-index: 2;
        }

        /* Area Animasi Lingkaran */
        .animation-box {
            position: relative;
            width: clamp(120px, 25vw, 180px);
            height: clamp(120px, 25vw, 180px);
            margin-bottom: clamp(30px, 8vw, 50px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
        }

        /* Lingkaran Luar (Sian) */
        .circle-1 {
            width: 100%;
            height: 100%;
            border-top-color: #00f3ff;
            border-bottom-color: #00f3ff;
            animation: spin 2.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }

        /* Lingkaran Tengah (Pink/Magenta) */
        .circle-2 {
            width: 80%;
            height: 80%;
            border-left-color: #ff007f;
            border-right-color: #ff007f;
            animation: spin-reverse 2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }

        /* Lingkaran Dalam (Ungu) */
        .circle-3 {
            width: 60%;
            height: 60%;
            border-top-color: #9d00ff;
            border-bottom-color: #9d00ff;
            animation: spin 1.2s linear infinite;
        }

        /* Inti Cahaya di Tengah */
        .core {
            position: absolute;
            width: 25%;
            height: 25%;
            background: radial-gradient(circle, #00f3ff 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite alternate;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.8);
        }

        /* Gaya Tulisan MAINTENANCE */
        h1 {
            color: #ffffff;
            font-size: clamp(1.8rem, 6vw, 3.2rem);
            font-weight: 800;
            /* Menggunakan clamp agar ukuran huruf menyesuaikan layar secara dinamis */
            letter-spacing: clamp(6px, 1.5vw, 12px);
            text-transform: uppercase;
            position: relative;
            /* padding-left disamakan dengan letter-spacing agar teks benar-benar presisi di tengah */
            padding-left: clamp(6px, 1.5vw, 12px);
            animation: text-glow 2s ease-in-out infinite alternate;
            user-select: none;
        }

        /* Keyframes Animasi Putaran */
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-reverse {
            0% {
                transform: rotate(360deg);
            }
            100% {
                transform: rotate(0deg);
            }
        }

        /* Keyframes Denyut Inti Cahaya */
        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            100% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        /* Keyframes Cahaya Tulisan */
        @keyframes text-glow {
            0% {
                text-shadow: 0 0 10px rgba(0, 243, 255, 0.2),
                             0 0 20px rgba(0, 243, 255, 0.1);
                opacity: 0.8;
            }
            100% {
                text-shadow: 0 0 15px rgba(0, 243, 255, 0.6),
                             0 0 25px rgba(255, 0, 127, 0.4),
                             0 0 35px rgba(157, 0, 255, 0.2);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Bagian Animasi -->
        <div class="animation-box">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
            <div class="core"></div>
        </div>
        <!-- Bagian Teks -->
        <h1>Maintenance</h1>
    </div>
</body>
</html>
